version: 1
backend:
  phases:
    build:
      commands:
        # Deploys the Gen 2 backend (auth + data) and generates amplify_outputs.json
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # amplify_outputs.json produced by the backend phase is consumed here
        - npm run build:web
  artifacts:
    baseDirectory: web-build
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
